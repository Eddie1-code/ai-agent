spring:
  application:
    name: ai-agent-backend
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ai_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    # Redis配置
    redis:
      database: 2
      host: 127.0.0.1
      port: 6379
      password: 123456
  ai:
    #    ollama:
    #      base-url: http://localhost:11434
    #      chat:
    #        model: gemma3:1b
    # 本地默认不强依赖 MCP SSE 服务，避免未启动 8127 时持续报错
    # mcp:
    #   client:
    #     sse:
    #       connections:
    #         server1:
    #           url: http://localhost:8127
    #     stdio:
    #       servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api

app:
  rag:
    local:
      enabled: false
    cloud:
      knowledge-index: ${APP_RAG_CLOUD_KNOWLEDGE_INDEX:AI Agent生活导师}
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me-to-a-long-secret-key-change-me}
    jwt-expire-seconds: ${APP_JWT_EXPIRE_SECONDS:86400}
    api-keys:
      - demo-local-key
    max-requests-per-minute: 120

tencent:
  aiart:
    enabled: ${TENCENT_AIART_ENABLED:false}
    secret-id: ${TENCENT_SECRET_ID:}
    secret-key: ${TENCENT_SECRET_KEY:}
    region: ${TENCENT_AIART_REGION:ap-guangzhou}
    default-resolution: ${TENCENT_AIART_DEFAULT_RESOLUTION:1024:1024}
    rsp-img-type: ${TENCENT_AIART_RSP_IMG_TYPE:url}
    timeout-seconds: ${TENCENT_AIART_TIMEOUT_SECONDS:60}
    max-generate-per-minute: ${TENCENT_AIART_MAX_GENERATE_PER_MINUTE:6}
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xcw.aiagentbackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
