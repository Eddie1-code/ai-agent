spring:
  application:
    name: ai-agent-backend
  profiles:
    active: local
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        #了解决向量的维度，根据使用的嵌入模型进行调整
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
    #    ollama:
    #      base-url: http://localhost:11434
    #      chat:
    #        model: gemma3:1b
    # 本地默认不强依赖 MCP SSE 服务，避免未启动 8127 时持续报错
    # mcp:
    #   client:
    #     sse:
    #       connections:
    #         server1:
    #           url: http://localhost:8127
    #     stdio:
    #       servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api

app:
  security:
    api-keys:
      - demo-local-key
    max-requests-per-minute: 120
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xcw.aiagentbackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
